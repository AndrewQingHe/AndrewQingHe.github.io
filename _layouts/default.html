<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="{{ '/styles.css' | relative_url }}" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax for LaTeX math rendering -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
          processEscapes: true,
          processEnvironments: true,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    {% seo %}
  </head>
  <body>
    <!-- Language Toggle -->
    <div class="language-toggle">
      <button class="btn btn-outline-primary btn-sm" id="langToggle"><i class="fas fa-language"></i> 中文</button>
    </div>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ '/' | relative_url }}">
          <span id="navName">Andrew Qing He</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ '/' | relative_url }}#home" id="navHome">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ '/' | relative_url }}#research" id="navResearch">Research</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ '/' | relative_url }}#publications" id="navPublications">Publications</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ '/' | relative_url }}#experience" id="navExperience">Experience</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ '/blog/' | relative_url }}" id="navBlog">Blog</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    {{ content }}

    <!-- Footer -->
    <footer class="bg-dark text-light py-4">
      <div class="container text-center">
        <p class="mb-0" id="footerText">
          &copy; {{ site.time | date: '%Y' }} Andrew Qing He (何清). All rights reserved.
        </p>
        <div class="mt-3">
          <a href="https://github.com/AndrewQingHe" class="text-light me-3" target="_blank">
            <i class="fab fa-github fa-lg"></i>
          </a>
          <a href="https://scholar.google.com/" class="text-light me-3" target="_blank">
            <i class="fas fa-graduation-cap fa-lg"></i>
          </a>
          <a href="mailto:{{ site.email }}" class="text-light">
            <i class="fas fa-envelope fa-lg"></i>
          </a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ '/script.js' | relative_url }}"></script>
  </body>
</html>
